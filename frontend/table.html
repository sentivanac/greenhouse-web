<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Greenhouse table</title>

    <link rel="stylesheet" href="/css/main.css">
</head>

<body>

<div class="container">

    <div class="box">
        <table>
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Temp [°C]</th>
                    <th>Humidity [%]</th>
                    <th>Moisture [%]</th>
                    <th>Light (max)</th>
                </tr>
            </thead>

            <tbody id="tableBody">
            </tbody>
        </table>
    </div>

</div>

<script src="/js/table.js"></script>

</body>
</html>
