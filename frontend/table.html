<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Greenhouse table</title>

    <link rel="stylesheet" href="/css/main.css">
</head>

<body>

<div class="topbar">
    <div class="tabs">
        <a href="/index.html" class="tab">Overview</a>
        <a href="/table.html" class="tab active">Table</a>
    </div>
    <div class="actions">
        <button id="themeToggle">Toggle theme</button>
    </div>
</div>

<div class="container">

    <div class="box">
        <div class="table-scroll">
            <table>
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Temp [°C]</th>
                        <th>Humidity [%]</th>
                        <th>Moisture [%]</th>
                        <th>Light (max)</th>
                    </tr>
                </thead>
            </div>
            <tbody id="tableBody">
            </tbody>
        </table>
    </div>

</div>

<script src="/js/table.js"></script>

</body>
</html>
