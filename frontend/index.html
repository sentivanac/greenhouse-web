<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Greenhouse overview</title>

    <link rel="stylesheet" href="css/main.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/luxon@3"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/sr.js"></script>
</head>

<body>
    <div class="container">
        <!-- <h2>Overview</h2> -->
        <div class="top-layout">
            <div class="left">
                <div class="box">
                    <!-- Temperature box -->
                    <div class="gauge-item">
                        <div class="gauge-header">
                            <span>Temperature</span>
                            <span>
                                <span id="tempValue">–</span>
                                <span class="unit">°C</span>
                            </span>
                        </div>
                        <div class="gauge-bar">
                            <div class="gauge-fill" id="tempBar"></div>
                        </div>
                    </div>
                    <!-- Humidity box -->
                    <div class="gauge-item">
                        <div class="gauge-header">
                            <span>Humidity</span>
                            <span>
                                <span id="humValue">–</span>
                                <span class="unit">%</span>
                            </span>
                        </div>
                        <div class="gauge-bar">
                            <div class="gauge-fill" id="humBar" style="background:#36a2eb"></div>
                        </div>
                    </div>
                    <!-- Soil box -->
                    <div class="gauge-item">
                        <div class="gauge-header">
                            <span>Soil</span>
                            <span>
                                <span id="soilValue">–</span>
                                <span class="unit">%</span>
                            </span>
                        </div>
                        <div class="gauge-bar">
                            <div class="gauge-fill" id="soilBar" style="background:#8bc34a"></div>
                        </div>
                    </div>
                    <!-- Light box -->
                    <div class="gauge-item">
                        <div class="gauge-header">
                            <span>Light (max)</span>
                            <span id="lightValue">–</span>
                        </div>
                        <div class="gauge-bar">
                            <div class="gauge-fill" id="lightBar" style="background:#ffcd56"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="right">
                <div class="box">
                    <table>
                        <thead>
                            <tr>
                                <th>Time</th>
                                <th>Temp [°C]</th>
                                <th>Humidity [%]</th>
                                <th>Moisture [%]</th>
                                <th>Light (max)</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <!-- rows -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="bottom-layout">
            <div class="left">
                <div class="box date-controls">
                    <label>
                        From:
                        <input type="text" id="fromDate">
                    </label>

                    <label style="margin-top:10px; display:block">
                        To:
                        <input type="text" id="toDate">
                    </label>

                    <button id="applyBtn" style="margin-top:15px">
                        Apply
                    </button>
                </div>
            </div>
            <div class="right">
                <div class="box">
                    <div class="chart-box">
                        <canvas id="tempChart"></canvas>
                    </div>
                    <div class="chart-box">
                        <canvas id="humChart"></canvas>
                    </div>
                    <div class="chart-box">
                        <canvas id="lightChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
        <div class="leftalign">
            <button id="themeToggle">Toggle theme</button>
        </div>
    </div>
    <script src="/js/script.js"></script>
</body>

</html>
